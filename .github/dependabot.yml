version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      all-dependencies:
        patterns: ["*"]
        exclude-patterns: ["eslint"]
    ignore:
      - dependency-name: "eslint"
        versions: [">=10.0.0"]
    open-pull-requests-limit: 2
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      all-actions:
        patterns: ["*"]
    open-pull-requests-limit: 1

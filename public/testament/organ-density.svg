<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="600" height="350">
<title>ORGANVM — Organ Density</title>
<style>
  text { font-family: "SF Mono", "Fira Code", monospace; }
  .label { font-size: 11px; fill: currentColor; }
  .title { font-size: 14px; font-weight: 600; fill: currentColor; }
  .stat { font-size: 10px; fill: currentColor; opacity: 0.7; }
  .big { font-size: 28px; font-weight: 700; fill: currentColor; }
</style>

<rect width="600" height="350" fill="#0f0f23"/>
<text x="300.0" y="25.0" class="title" text-anchor="middle" fill="#d4d4d8">System Density by Organ</text>
<rect x="110" y="50" width="450" height="24" fill="#1a1a2e" rx="3"/>
<rect x="110" y="50" width="315.0" height="24" fill="#e94560" opacity="0.75" rx="3"/>
<text x="102.0" y="66.0" class="label" text-anchor="end" fill="#d4d4d8">Meta (META)</text>
<text x="433.0" y="66.0" class="stat" text-anchor="start" fill="#6b7280">70%</text>
<rect x="110" y="84" width="450" height="24" fill="#1a1a2e" rx="3"/>
<rect x="110" y="84" width="261.0" height="24" fill="#e94560" opacity="0.75" rx="3"/>
<text x="102.0" y="100.0" class="label" text-anchor="end" fill="#d4d4d8">Theoria (I)</text>
<text x="379.0" y="100.0" class="stat" text-anchor="start" fill="#6b7280">57%</text>
<rect x="110" y="118" width="450" height="24" fill="#1a1a2e" rx="3"/>
<rect x="110" y="118" width="252.0" height="24" fill="#e94560" opacity="0.75" rx="3"/>

<text x="370.0" y="134.0" class="stat" text-anchor="start" fill="#6b7280">56%</text>
<rect x="110" y="152" width="450" height="24" fill="#1a1a2e" rx="3"/>
<rect x="110" y="152" width="216.0" height="24" fill="#e94560" opacity="0.75" rx="3"/>
<text x="102.0" y="168.0" class="label" text-anchor="end" fill="#d4d4d8">Poiesis (II)</text>
<text x="334.0" y="168.0" class="stat" text-anchor="start" fill="#6b7280">48%</text>
<rect x="110" y="186" width="450" height="24" fill="#1a1a2e" rx="3"/>
<rect x="110" y="186" width="202.5" height="24" fill="#e94560" opacity="0.75" rx="3"/>
<text x="102.0" y="202.0" class="label" text-anchor="end" fill="#d4d4d8">Taxis (IV)</text>
<text x="320.5" y="202.0" class="stat" text-anchor="start" fill="#6b7280">45%</text>
<rect x="110" y="220" width="450" height="24" fill="#1a1a2e" rx="3"/>
<rect x="110" y="220" width="157.5" height="24" fill="#e94560" opacity="0.75" rx="3"/>
<text x="102.0" y="236.0" class="label" text-anchor="end" fill="#d4d4d8">Logos (V)</text>
<text x="275.5" y="236.0" class="stat" text-anchor="start" fill="#6b7280">35%</text>
<rect x="110" y="254" width="450" height="24" fill="#1a1a2e" rx="3"/>
<rect x="110" y="254" width="135.0" height="24" fill="#e94560" opacity="0.75" rx="3"/>
<text x="102.0" y="270.0" class="label" text-anchor="end" fill="#d4d4d8">Koinonia (VI)</text>
<text x="253.0" y="270.0" class="stat" text-anchor="start" fill="#6b7280">30%</text>
<rect x="110" y="288" width="450" height="24" fill="#1a1a2e" rx="3"/>
<rect x="110" y="288" width="112.5" height="24" fill="#e94560" opacity="0.75" rx="3"/>
<text x="102.0" y="304.0" class="label" text-anchor="end" fill="#d4d4d8">Kerygma (VII)</text>
<text x="230.5" y="304.0" class="stat" text-anchor="start" fill="#6b7280">25%</text>
